name: Security Fast

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: read
  checks: write  # Required for rustsec/audit-check to create check runs
  security-events: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast security checks (< 3 min) - parallel execution
  cargo-audit:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

  cargo-deny:
    name: License & Supply Chain
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - uses: EmbarkStudios/cargo-deny-action@82eb9f621fbc699dd0918f3ea06864c14cc84246 # v2

  clippy-security:
    name: Security Lints
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # stable
      with:
          toolchain: stable
        components: clippy

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        workspaces: rust

    - name: Run Clippy security lints
      run: |
        cd rust
        cargo clippy --no-default-features --features compression,checksum,messagepack,encryption \
          -- -D warnings -W clippy::cargo -W clippy::pedantic

  cargo-machete:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # stable
        with:
          toolchain: stable

    - name: Install cargo-binstall
      uses: cargo-bins/cargo-binstall@main

    - name: Install cargo-machete
      run: cargo binstall --no-confirm cargo-machete

    - name: Check for unused dependencies
      run: |
        cd rust
        cargo machete

  pip-audit:
    name: Python Dependency CVEs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Install uv
      uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12

    - name: Cache Python virtual environment
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: .venv
        key: venv-${{ runner.os }}-py3.12-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
        restore-keys: |
          venv-${{ runner.os }}-py3.12-

    - name: Install dependencies
      run: |
        uv sync --group dev

    - name: Run pip-audit
      run: |
        uv run pip-audit --desc --format json --output pip-audit-report.json

    - name: Upload report
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: pip-audit-report
        path: pip-audit-report.json

  # Summary job - fail if any check fails
  security-fast-success:
    name: Security Fast Success
    runs-on: ubuntu-latest
    needs: [cargo-audit, cargo-deny, clippy-security, cargo-machete, pip-audit]
    if: always()
    steps:
    - name: Check all security checks passed
      run: |
        if [[ "${{ needs.cargo-audit.result }}" != "success" ]] || \
           [[ "${{ needs.cargo-deny.result }}" != "success" ]] || \
           [[ "${{ needs.clippy-security.result }}" != "success" ]] || \
           [[ "${{ needs.cargo-machete.result }}" != "success" ]] || \
           [[ "${{ needs.pip-audit.result }}" != "success" ]]; then
          echo "❌ One or more security checks failed"
          exit 1
        fi
        echo "✅ All fast security checks passed"
