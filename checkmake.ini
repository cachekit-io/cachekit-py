# checkmake configuration for the cachekit Makefile.
# Run locally: `make lint-makefile`  (also wired as a pre-commit hook).
#
# We adopt checkmake for the rule that catches real issues (phonydeclared) and
# disable two whose defaults clash with this repo's deliberate conventions:
#
#   maxbodylength (default 5) — this Makefile's idiom is `<cmd> 2>&1 | tee log;
#     if-fail; exit 1`, a `help` menu of echoes, and make-orchestration targets
#     that delegate via $(MAKE) — all legitimately longer than 5 lines. The
#     targets that WERE genuinely procedural shell scripts (security-install,
#     security-report, version-check, fuzz-quick, build-multiarch-linux) have
#     been extracted to scripts/, so the remaining length is idiom, not bloat.
#
#   minphony — expects a required `all` target; this repo uses
#     `.DEFAULT_GOAL := help` by design and has no `all`.
#
[maxbodylength]
disabled = true

[minphony]
disabled = true
